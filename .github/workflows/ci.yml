name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate data
        run: python src/generate_data.py --n 12000
      - name: Train models
        run: python src/train.py
      - name: Build tour plan
        run: python src/tour.py --budget 12000 --min-cities 6
      - name: Run tests
        run: python -m pytest tests/ -v
